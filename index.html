<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Static Website</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
    }

    header {
      background: #0077cc;
      color: white;
      padding: 30px;
    }

    header h1 {
      margin-bottom: 10px;
    }

    .container {
      margin-top: 50px;
    }

    button {
      background: #0077cc;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #005fa3;
    }

    #message {
      margin-top: 20px;
      font-size: 18px;
      color: green;
    }

    footer {
      margin-top: 60px;
      background: #222;
      color: white;
      padding: 15px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Welcome to My Static Website</h1>
    <p>Hosted on AWS S3</p>
  </header>

  <div class="container">
    <h2>Hello DevOps Learner 🚀</h2>
    <p>This is a simple static website using HTML, CSS, and JavaScript.</p>

    <br>

    <button onclick="showMessage()">Click Me</button>

    <p id="message"></p>
  </div>

  <footer>
    <p>© 2026 Static Website Project</p>
  </footer>

  <script>
    function showMessage() {
      document.getElementById("message").innerHTML =
        "Website is working successfully!";
    }
  </script>

</body>
</html>
